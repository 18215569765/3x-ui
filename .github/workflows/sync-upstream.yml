name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  UPSTREAM_REPO: MHSanaei/3x-ui
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Sync code and keep only this workflow
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp .github/workflows/sync-upstream.yml "$RUNNER_TEMP/sync-upstream.yml"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}"
          git read-tree --reset -u "upstream/${UPSTREAM_BRANCH}"

          mkdir -p .github/workflows
          find .github/workflows -maxdepth 1 -type f -delete
          cp "$RUNNER_TEMP/sync-upstream.yml" .github/workflows/sync-upstream.yml

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync upstream"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi
